<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tofan Store | متجر طوفان</title>

  <link id="siteFavicon" rel="icon" type="image/png" href="https://up6.cc/2026/03/17733402856661.png" />
  <link rel="apple-touch-icon" href="https://up6.cc/2026/03/17733402856661.png" />

  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="dns-prefetch" href="//fonts.gstatic.com">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="//www.gstatic.com">
  <link rel="dns-prefetch" href="//up6.cc">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://up6.cc" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --soft:#f3f6f8;
      --line:#e8edf2;
      --gold:#f6b900;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Cairo',sans-serif;
      background:#f7f8fa;
      overflow-x:hidden;
      color:#1f2937;
      -webkit-tap-highlight-color:transparent;
      text-rendering:optimizeLegibility;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .hidden-scrollbar::-webkit-scrollbar{display:none}
    .hidden-scrollbar{scrollbar-width:none}

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      height:3px;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      z-index:9999;
      transition:width .3s ease;
    }

    .badge{
      position:absolute;
      top:-5px;
      right:-5px;
      background:var(--accent);
      color:#fff;
      font-size:10px;
      width:18px;
      height:18px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      border:2px solid #fff;
    }
    html[dir="ltr"] .badge{right:auto;left:-5px}

    .header{
      background:#fff;
      position:sticky;
      top:0;
      z-index:1900;
      box-shadow:0 1px 10px rgba(0,0,0,.04);
      padding:10px 14px;
    }

    .header-row{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:42px;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:12px;
      z-index:3;
      min-width:82px;
      transition:transform .2s ease;
    }

    .header-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      z-index:2;
      pointer-events:none;
    }
    .header-center a{
      pointer-events:auto;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .header-logo-shell{
      position:relative;
      width:94px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:visible;
    }
    .header-center img{
      height:34px;
      max-width:94px;
      object-fit:contain;
      display:block;
      opacity:0;
      transition:opacity .22s ease;
      transform:scale(1.18);
      transform-origin:center center;
    }
    .header-center img.logo-loaded{opacity:1}

    .icon-btn{
      background:transparent;
      border:none;
      padding:0;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .lang-btn{
      background:#f3f4f6;
      border:none;
      border-radius:10px;
      padding:5px 10px;
      font-size:12px;
      font-weight:800;
      color:#4b5563;
      cursor:pointer;
    }

    .search-results-box{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
      padding:10px;
      margin-top:10px;
      display:none;
      position:relative;
      z-index:1800;
    }

    .search-dropdown{
      background:#fff;
      border-bottom:1px solid #eef2f6;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
      max-height:0;
      overflow:hidden;
      opacity:0;
      transition:max-height .2s ease, opacity .16s ease, padding .16s ease;
      padding:0 14px;
    }
    .search-dropdown.open{
      max-height:230px;
      opacity:1;
      padding:10px 14px 12px;
    }

    .search-input{
      width:100%;
      height:42px;
      border:none;
      outline:none;
      background:#f3f4f6;
      border-radius:999px;
      padding:0 14px;
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .hero-wrap,
    .extra-banner-wrap{
      position:relative;
      overflow:hidden;
      background:#eef2f7;
      min-height:160px;
    }
    .hero-wrap img,
    .extra-banner-wrap img{
      width:100%;
      display:block;
      object-fit:cover;
      opacity:0;
      transition:opacity .24s ease;
    }
    .hero-wrap img.media-loaded,
    .extra-banner-wrap img.media-loaded{
      opacity:1;
    }

    .section-title-line{
      height:1px;
      background:#e5e7eb;
      flex:1;
    }

    .catSwiper{overflow:hidden}

    .cat-icon-wrapper{
      width:76px;
      height:76px;
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      transition:transform .18s ease, background-color .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
      box-shadow:0 4px 12px rgba(0,0,0,.03);
      overflow:hidden;
      will-change:transform;
      position:relative;
      flex:0 0 76px;
      contain:layout paint style;
    }
    .cat-icon-wrapper img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:0;
      transition:opacity .22s ease;
      transform:translateZ(0);
    }
    .cat-icon-wrapper img.media-loaded{opacity:1}

    .cat-image-fade,
    .soft-image-fade{
      position:absolute;
      inset:0;
      background:#eef2f6;
      opacity:1;
      transition:opacity .22s ease;
      pointer-events:none;
    }
    .cat-image-fade.hidden,
    .soft-image-fade.hidden{opacity:0}

    .swiper-pagination-bullet{
      width:18px !important;
      height:4px !important;
      border-radius:999px !important;
      background:#cbd5e1 !important;
      opacity:1 !important;
      transition:.22s ease !important;
    }
    .swiper-pagination-bullet-active{
      width:34px !important;
      background:var(--primary) !important;
    }

    .rounded-banner{
      overflow:hidden;
      background:#fff;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    .product-card{
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
      transition:transform .18s ease, box-shadow .18s ease, opacity .22s ease;
      position:relative;
      opacity:0;
      transform:translateY(20px);
      will-change:transform,opacity;
      backface-visibility:hidden;
      cursor:pointer;
      contain:layout paint style;
      content-visibility:auto;
      contain-intrinsic-size:380px;
    }
    .product-card.visible{
      opacity:1;
      transform:translateY(0);
    }

    .img-container{
      position:relative;
      aspect-ratio:1/1.08;
      overflow:hidden;
      background:#f3f4f6;
    }
    .img-container img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:0;
      transition:opacity .24s ease, transform .24s ease;
      transform:translateZ(0);
    }
    .img-container img.media-loaded{opacity:1}

    .front-img,.back-img{
      position:absolute;
      inset:0;
      will-change:opacity,transform;
      backface-visibility:hidden;
    }
    .back-img{
      opacity:0;
      transform:scale(1.02);
    }
    .img-container .front-img.media-loaded{opacity:1}
    .img-container .back-img.media-loaded{opacity:0}

    @media (hover:hover){
      .product-card:hover .back-img.media-loaded{
        opacity:1;
        transform:scale(1);
      }
      .product-card:hover .front-img.media-loaded{
        opacity:0;
      }
    }

    .product-card.touch-active .back-img.media-loaded{
      opacity:1;
      transform:scale(1);
    }
    .product-card.touch-active .front-img.media-loaded{
      opacity:0;
    }

    .product-image-loader,
    .banner-image-loader,
    .logo-image-loader{
      position:absolute;
      inset:0;
      background:#eef2f6;
      opacity:1;
      transition:opacity .22s ease;
      z-index:2;
      pointer-events:none;
    }
    .product-image-loader.hidden,
    .banner-image-loader.hidden,
    .logo-image-loader.hidden{
      opacity:0;
    }

    .wish-btn{
      position:absolute;
      top:10px;
      right:10px;
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(6px);
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
      border:none;
      cursor:pointer;
    }
    html[dir="ltr"] .wish-btn{
      right:auto;
      left:10px;
    }

    .discount-badge{
      position:absolute;
      top:10px;
      left:10px;
      min-width:54px;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      box-shadow:0 6px 16px rgba(243,112,33,.26);
    }

    .hollow-cart-btn{
      width:100%;
      height:42px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.18s ease;
      cursor:pointer;
      font-weight:800;
      border:2px solid var(--primary);
      color:var(--primary);
      background:transparent;
    }

    .empty-box{
      background:#fff;
      border:1px dashed #dbe3eb;
      border-radius:24px;
      padding:24px;
      text-align:center;
      color:#94a3b8;
      font-weight:700;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      border-top:1px solid #edf2f7;
      display:flex;
      justify-content:space-around;
      padding:12px 6px calc(12px + env(safe-area-inset-bottom));
      z-index:2000;
      box-shadow:0 -8px 24px rgba(0,0,0,.06);
    }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:800;
      animation:toastUp .14s ease;
      white-space:nowrap;
      max-width:90%;
      overflow:hidden;
      text-overflow:ellipsis;
      will-change:transform,opacity;
    }

    .section-slider{position:relative}
    .section-slider .swiper-button-prev,
    .section-slider .swiper-button-next{
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(17,24,39,.8);
      color:#fff;
    }
    .section-slider .swiper-button-prev:after,
    .section-slider .swiper-button-next:after{
      font-size:13px;
      font-weight:900;
    }

    .hero-hidden{display:none !important}

    .price-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:4px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .old-price{
      font-size:13px;
      color:#b9c0c8;
      text-decoration:line-through;
      font-weight:800;
    }
    .new-price{
      font-size:16px;
      color:var(--primary);
      font-weight:900;
    }

    .store-footer{
      margin:30px 16px 0;
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
      overflow:hidden;
      content-visibility:auto;
      contain-intrinsic-size:400px;
    }

    .footer-head{padding:22px 18px 10px;text-align:center}
    .footer-title{color:var(--primary);font-size:20px;font-weight:900;margin-bottom:6px}
    .footer-sub{color:#94a3b8;font-size:12px;font-weight:800}
    .footer-section{padding:18px;border-top:1px solid #eef2f6}
    .footer-section-title{font-size:14px;font-weight:900;color:var(--primary);margin-bottom:14px;text-align:center}
    .social-grid,.payment-icons-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center}
    .social-link{
      width:50px;height:50px;border-radius:16px;border:1px solid #e7edf3;background:#f8fafc;display:flex;align-items:center;justify-content:center;color:var(--primary);
      transition:.18s ease;box-shadow:0 4px 12px rgba(0,0,0,.03);
    }
    .payment-icon-card{
      background:#fff;border:1px solid #e9eef3;border-radius:18px;padding:12px 16px;display:flex;align-items:center;justify-content:center;min-height:64px;min-width:120px;
    }
    .payment-icon-card img{max-width:100%;max-height:36px;object-fit:contain;display:block}
    .footer-copy{text-align:center;color:#94a3b8;font-size:12px;font-weight:800;padding:16px 18px 20px;border-top:1px solid #eef2f6;background:#fbfcfd}

    .desktop-products-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .reviews-section{
      margin:30px 16px 0;
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
      overflow:hidden;
      padding:22px 16px 20px;
      content-visibility:auto;
      contain-intrinsic-size:320px;
    }
    .reviews-header{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
    .reviews-header-line{width:48px;height:1px;background:#d7dee6}
    .reviews-title{font-size:24px;font-weight:900;color:var(--primary);line-height:1}
    .reviews-swiper{overflow:hidden;padding:6px 2px 2px}
    .review-card{
      background:linear-gradient(135deg,#2d7a87 0%, #14454d 100%);
      color:#fff;border-radius:22px;padding:20px 16px;box-shadow:0 12px 30px rgba(20,69,77,.20);min-height:210px;
      display:flex;flex-direction:column;justify-content:space-between;text-align:center;
    }
    .review-stars{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:12px}
    .review-stars svg{width:18px;height:18px;fill:var(--gold);flex:0 0 18px}
    .review-text{font-size:14px;font-weight:700;line-height:2;color:#f8fbfc;min-height:84px;display:flex;align-items:center;justify-content:center}
    .review-name{margin-top:14px;font-size:18px;font-weight:900;color:#fff}
    .reviews-swiper .swiper-pagination{position:static;margin-top:16px}

    .scroll-top-btn{
      position:fixed;left:16px;bottom:96px;width:48px;height:48px;border:none;border-radius:999px;background:var(--primary);color:#fff;
      display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px rgba(20,69,77,.24);z-index:2050;cursor:pointer;
      opacity:0;visibility:hidden;transform:translateY(12px);transition:opacity .2s ease, transform .2s ease, visibility .2s ease;
    }
    .scroll-top-btn.show{opacity:1;visibility:visible;transform:translateY(0)}

    @media (min-width:1024px){
      .desktop-products-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .scroll-top-btn{bottom:28px}
    }
    @media (min-width:1440px){
      .desktop-products-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
    }
    @keyframes toastUp{
      from{opacity:0;transform:translate(-50%,18px)}
      to{opacity:1;transform:translate(-50%,0)}
    }
  </style>
</head>
<body>

  <div id="topLoading" class="top-loading"></div>

  <header class="header" id="siteHeader">
    <div class="header-row" id="headerRow">
      <div class="header-left">
        <button class="icon-btn" type="button" onclick="openSidebar()">
          <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button class="lang-btn" type="button" onclick="toggleLang()" id="lang-btn">E</button>
      </div>

      <div class="header-center">
        <a href="index.html" aria-label="Store Home">
          <div class="header-logo-shell">
            <div class="logo-image-loader" id="headerLogoLoader"></div>
            <img id="headerLogo" src="" alt="Logo">
          </div>
        </a>
      </div>

      <div class="header-right">
        <button class="icon-btn relative" type="button" onclick="openBottomPane('cart')">
          <svg class="w-7 h-7 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
          <span id="cart-badge-header" class="badge">0</span>
        </button>

        <button class="icon-btn" type="button" onclick="toggleSearchBar(event)">
          <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <div id="searchDropdown" class="search-dropdown">
    <input id="searchInput" type="text" class="search-input" placeholder="ابحث داخل الموقع..." oninput="performSearch(this.value)" onclick="event.stopPropagation()">
    <div id="searchResultsBox" class="search-results-box"></div>
  </div>

  <main class="pb-28">
    <section id="heroSection" class="w-full mb-6">
      <div class="hero-wrap">
        <div class="banner-image-loader" id="topBannerLoader"></div>
        <img id="topBanner" src="" alt="Offer banner" loading="eager" fetchpriority="high" decoding="async">
      </div>
    </section>

    <section id="topDynamicSections" class="mb-6"></section>

    <section class="px-4 mb-10">
      <div class="flex items-center justify-center gap-4 mb-8">
        <div class="section-title-line"></div>
        <h2 class="font-black text-[#14454d] text-lg" data-i18n="cat-title">أقسام المتجر</h2>
        <div class="section-title-line"></div>
      </div>

      <div class="swiper catSwiper">
        <div class="swiper-wrapper" id="categories-swiper-wrapper"></div>
        <div class="swiper-pagination !static mt-8"></div>
      </div>
    </section>

    <section id="afterCategoriesSections" class="mb-6"></section>

    <section class="px-4">
      <div id="products-sections"></div>
    </section>

    <section id="bottomDynamicSections" class="mb-6"></section>

    <section id="customerReviewsSection" class="reviews-section">
      <div class="reviews-header">
        <span class="reviews-header-line"></span>
        <h3 id="reviewsTitle" class="reviews-title">آراء العملاء</h3>
        <span class="reviews-header-line"></span>
      </div>

      <div class="swiper reviews-swiper" id="reviewsSwiper">
        <div class="swiper-wrapper" id="reviewsWrapper"></div>
        <div class="swiper-pagination" id="reviewsPagination"></div>
      </div>
    </section>

    <section id="storeFooterSection" class="store-footer hidden">
      <div class="footer-head">
        <div class="footer-title" id="footerStoreTitle">Tofan Store</div>
        <div class="footer-sub" id="footerStoreSub">تابعنا وادفع بالطريقة المناسبة لك</div>
      </div>

      <div class="footer-section" id="socialFooterWrap">
        <div class="footer-section-title" id="socialFooterTitle">تابعنا على</div>
        <div class="social-grid" id="socialLinksGrid"></div>
      </div>

      <div class="footer-section" id="paymentFooterWrap">
        <div class="footer-section-title" id="paymentFooterTitle">طرق الدفع المتاحة</div>
        <div class="payment-icons-grid" id="footerPaymentMethodsGrid"></div>
      </div>

      <div class="footer-copy" id="footerCopyText">© جميع الحقوق محفوظة</div>
    </section>
  </main>

  <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopPage()" aria-label="العودة للأعلى">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4" d="M5 15l7-7 7 7"></path>
    </svg>
  </button>
