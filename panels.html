    <div class="flex items-center gap-3">
      <a href="index.html" class="sidebar-logo-shell" aria-label="Store Home">
        <div class="logo-image-loader" id="sidebarLogoLoader"></div>
        <img id="sidebarLogo" src="" alt="logo">
      </a>
      <div>
        <div id="sidebarStoreName" class="font-black text-base text-[#14454d]">متجر طوفان</div>
        <div class="text-[11px] text-gray-400 font-bold">TOFAN STORE</div>
      </div>
    </div>
    <button onclick="closeAll()" class="text-3xl text-gray-300">&times;</button>
  </div>

  <div id="sidebarUserBox" class="mb-6"></div>

  <div class="space-y-3 mb-5">
    <button class="auth-chip" onclick="goOrderPage()">
      <span class="flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span id="sidebarProfileText">الحساب والطلبات</span>
      </span>
      <span class="text-gray-400 text-xs font-bold">فتح</span>
    </button>

    <button class="auth-chip" onclick="openBottomPane('cart')">
      <span class="flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <span data-i18n="cart">السلة</span>
      </span>
      <span id="sidebarCartCount" class="text-gray-400 text-xs font-bold">0</span>
    </button>

    <button class="auth-chip" onclick="openBottomPane('wish')">
      <span class="flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        <span data-i18n="wish">الأمنيات</span>
      </span>
      <span id="sidebarWishCount" class="text-gray-400 text-xs font-bold">0</span>
    </button>

    <button class="auth-chip" onclick="window.location.href='admin.html'">
      <span class="flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35A1.724 1.724 0 005.38 7.753c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"></path><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        <span>الإعدادات</span>
      </span>
      <span class="text-gray-400 text-xs font-bold">فتح</span>
    </button>
  </div>

  <div id="sidebarDynamicMenuWrap" class="mb-5"></div>

  <div class="dashed-sep my-5"></div>

  <div>
    <div class="text-sm font-black text-[#14454d] mb-4" data-i18n="cat-title">أقسام المتجر</div>
    <nav id="sidebarCategories" class="flex flex-col gap-4 text-sm font-bold text-gray-600"></nav>
  </div>
</aside>

<div id="cart-pane" class="bottom-pane p-4 sm:p-5">
  <div class="sheet-layout">
    <div class="flex justify-between items-center mb-3 border-b pb-3">
      <h3 class="font-black text-lg text-[#14454d]" data-i18n="cart-header">سلة المشتريات</h3>
      <button onclick="closeAll()" class="text-3xl text-gray-300 leading-none">&times;</button>
    </div>

    <div id="cart-content" class="sheet-scroll space-y-4 pr-1 hidden-scrollbar pb-4"></div>

    <div class="cart-checkout-bar space-y-2">
      <div class="bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 flex items-center justify-between">
        <span class="text-sm text-gray-500 font-bold" data-i18n="selected-total">الإجمالي المحدد</span>
        <span id="cart-total" class="font-black text-[#14454d] text-lg">0 ₪</span>
      </div>
      <button class="primary-btn" onclick="checkoutSelectedCart()" data-i18n="buy-selected">شراء المنتجات المحددة</button>
      <button class="secondary-btn" onclick="selectAllCartItems()" data-i18n="select-all">تحديد الكل</button>
    </div>
  </div>
</div>

<div id="wish-pane" class="bottom-pane p-6">
  <div class="sheet-layout">
    <div class="flex justify-between items-center mb-5 border-b pb-4">
      <h3 class="font-black text-lg text-[#14454d]" data-i18n="wish-header">قائمة الأمنيات</h3>
      <button onclick="closeAll()" class="text-3xl text-gray-300">&times;</button>
    </div>
    <div id="wish-content" class="sheet-scroll hidden-scrollbar"></div>
  </div>
</div>

<div id="menuPopup" class="popup-sheet">
  <div class="p-5 border-b flex items-center justify-between">
    <h3 id="menuPopupTitle" class="font-black text-lg text-[#14454d]">نافذة</h3>
    <button onclick="closeMenuPopup()" class="text-3xl text-gray-300 leading-none">&times;</button>
  </div>
  <div id="menuPopupBody" class="p-5"></div>
</div>
